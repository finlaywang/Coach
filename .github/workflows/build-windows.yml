name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas openpyxl pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --name ota_daily_report ota_daily_report.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ota_daily_report-windows
          path: dist/ota_daily_report.exe
